<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap">
<style>
/* paleopal loading splash.
   The .welcome-* rules below MUST stay in sync with myapp/www/welcome.css so
   this splash and the in-app "Welcome" panel look identical -- once the app
   finishes loading, the only visible change should be the added nav items.
   full_logo.png, logo_tagline.png, and ammonite-spinner.webp are copied to the
   site root by the build (.github/workflows/deploy-app.yaml) so they resolve here. */

/* full-viewport overlay, removed by myapp/www/app.js once Shiny connects */
div.loading-page {
  background-color: #ffffff;
  color: #101419;
  width: 100vw;
  height: 100vh;
  position: absolute;
  margin-top: 0px;
  top: 0;
  left: 0;
  right: 0;
  z-index: 999;
  font-family: "IBM Plex Sans", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

/* a stand-in for the bslib navbar: just the brand, with no nav items yet */
.loading-page .loading-navbar {
  display: flex;
  align-items: center;
  min-height: 3rem;
  padding: 0.5rem 0.75rem 0.9rem;
  background-color: #f5dfbb;
}
/* brand wordmark in the navbar */
.navbar-logo {
  display: block;
  height: 1.75rem;
  width: auto;
}
/* nudge the wordmark down on desktop only (>=768px) so its
   position lines up with the app navbar across the load handoff */
@media (min-width: 768px) {
  .navbar-logo {
    margin-top: 7px;
  }
}

/* shared welcome hero */
.welcome-hero {
  max-width: 48rem;
  margin: 0 auto;
  padding: 5rem 1.5rem 2rem;
  text-align: center;
}
.welcome-logo {
  display: block;
  width: 100%;
  max-width: 32rem;
  height: auto;
  margin: 0 auto 1.5rem;
}
.welcome-desc {
  font-size: 1rem;
  margin: 0 0 1.5rem;
}
.welcome-cue {
  font-size: 1rem;
  opacity: 0.75;
  margin: 0;
}

/* animated ammonite-shell loading indicator */
.loading-spinner {
  display: block;
  width: 80px;
  height: 80px;
  margin: 0 auto 0.75rem;
}
</style>
<div id="loading-page" class="loading-page">
  <div class="loading-navbar">
    <img src="full_logo.png" class="navbar-logo" alt="paleopal">
  </div>
  <div class="welcome-hero">
    <img src="logo_tagline.png" class="welcome-logo" alt="paleopal &mdash; learn &middot; teach &middot; reproduce">
    <p class="welcome-desc">Assemble a paleobiological data science workflow step by step: import occurrence data, clean and summarize it, and build figures. <strong>paleopal</strong> writes the equivalent reproducible R script for you to download, with nothing to install.</p>
    <img class="loading-spinner" src="ammonite-spinner.webp" role="status" aria-label="Loading" alt="Loading">
    <p class="welcome-cue">Now loading...</p>
  </div>
</div>
