<style>
/* modified from https://github.com/nanxstats/shiny-fcp-loader */
/* Loading page div */
div.loading-page {
  background-color: #6c757d;
  width: 100vw;
  height: 100vh;
  position: absolute;
  margin-top: 0px;
  top: 0;
  left: 0;
  right:0;
  z-index:999;
}

.loading-page h1, .loading-page h2 {
  text-align: center;
  color: #ffffff;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
  margin-top: 6rem;
  margin-bottom: 2rem;
}

.loading-page h1 {
  font-size: 3rem;
  font-weight: 500;
}
.loading-page h2 {
  font-size: 2rem;
  font-weight: 400;
}

/* CSS spinner from https://projects.lukehaas.me/css-loaders/ */
.loader, .loader:before, .loader:after {
  background: #ffffff;
  -webkit-animation: load1 1s infinite ease-in-out;
  animation: load1 1s infinite ease-in-out;
  width: 1em;
  height: 4em;
}
.loader {
  color: #ffffff;
  text-indent: -9999em;
  margin: 88px auto;
  position: relative;
  font-size: 11px;
  -webkit-transform: translateZ(0);
  -ms-transform: translateZ(0);
  transform: translateZ(0);
  -webkit-animation-delay: -0.16s;
  animation-delay: -0.16s;
}
.loader:before,
.loader:after {
  position: absolute;
  top: 0;
  content: '';
}
.loader:before {
  left: -1.5em;
  -webkit-animation-delay: -0.32s;
  animation-delay: -0.32s;
}
.loader:after {
  left: 1.5em;
}
@-webkit-keyframes load1 {
  0%,
  80%,
  100% {
    box-shadow: 0 0;
    height: 4em;
  }
  40% {
    box-shadow: 0 -2em;
    height: 5em;
  }
}
@keyframes load1 {
  0%,
  80%,
  100% {
    box-shadow: 0 0;
    height: 4em;
  }
  40% {
    box-shadow: 0 -2em;
    height: 5em;
  }
}
</style>
<div id="loading-page" class="loading-page">
  <h1>paleopal</h1>
  <h2>Please wait while the app loads...</h2>
  <div class="loader"></div>
</div>
