# Workflow derived from https://github.com/posit-dev/r-shinylive/blob/main/.github/workflows/deploy-app.yaml
name: Deploy app

on:
  workflow_call:
    inputs:
      cache-version:
        type: string
        default: "1"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: rstudio/shiny-workflows/setup-r-package@v1
        with:
          packages: |
            renv
            posit-dev/r-shinylive
            sessioninfo
          cache-version: ${{ github.event.inputs.cache-version }}

      - name: Find package dependencies
        shell: Rscript {0}
        id: packages
        run: |
          # Find package dependencies using {renv} and install with {pak}
          pak::repo_add(rhub = 'https://willgearty.r-universe.dev')
          pak::pak(
            unique(renv::dependencies("myapp")$Package)
          )

      - name: Build site
        shell: Rscript {0}
        run: |
          shinylive::export("myapp", "site", assets_version = "0.10.12",
                            template_params = list(title = "paleopal",
                            include_in_head =
                              "<!-- Favicons (copied to the site root by the file.copy() below; /paleopal/ base) -->
                              <link rel='icon' type='image/png' href='/paleopal/favicon-96x96.png' sizes='96x96' />
                              <link rel='icon' type='image/svg+xml' href='/paleopal/favicon.svg' />
                              <link rel='shortcut icon' href='/paleopal/favicon.ico' />
                              <link rel='apple-touch-icon' sizes='180x180' href='/paleopal/apple-touch-icon.png' />
                              <meta name='apple-mobile-web-app-title' content='paleopal' />
                              <link rel='manifest' href='/paleopal/site.webmanifest' />
                              <!-- Google tag (gtag.js) -->
                              <script async src='https://www.googletagmanager.com/gtag/js?id=G-B48C68KGQJ'></script>
                              <script>
                                window.dataLayer = window.dataLayer || [];
                                function gtag(){dataLayer.push(arguments);}
                                gtag('js', new Date());
                                gtag('config', 'G-B48C68KGQJ');
                              </script>",
                            include_before_body = shiny::includeHTML("loading.html")))
          # copy the brand logos and loading spinner to the site root so the
          # loading splash can reference them
          file.copy(c("myapp/www/full_logo.png", "myapp/www/logo_tagline.png",
                      "myapp/www/ammonite-spinner.webp"),
                    "site", overwrite = TRUE)
          # copy the favicon set to the site root for the parent-page <head>
          file.copy(list.files("favicons", full.names = TRUE), "site", overwrite = TRUE)

      - name: Upload site artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "site"

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Specify runner + deployment step
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
